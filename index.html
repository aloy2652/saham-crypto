<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HAI👋 ALDY AHMAD F. — Portfolio</title>
  <style>
    :root{
      --bg: #0b1020;
      --card: rgba(255,255,255,.06);
      --card2: rgba(255,255,255,.08);
      --stroke: rgba(255,255,255,.12);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.70);
      --muted2: rgba(255,255,255,.55);
      --good: #33d69f;
      --bad:  #ff5b6e;
      --accent:#7c5cff;
      --accent2:#19c2ff;
      --shadow: 0 18px 60px rgba(0,0,0,.45);
      --radius: 22px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
      color: var(--text);
      background:
        radial-gradient(900px 500px at 20% -10%, rgba(124,92,255,.35), transparent 55%),
        radial-gradient(900px 500px at 90% 10%, rgba(25,194,255,.25), transparent 55%),
        radial-gradient(900px 600px at 70% 120%, rgba(51,214,159,.14), transparent 60%),
        linear-gradient(180deg, #070a14, var(--bg) 40%, #070a14);
      min-height:100vh;
    }

    .wrap{
      width:min(1100px, 92vw);
      margin: 28px auto 60px;
    }

    /* Top bar */
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding: 14px 16px;
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      border-radius: 16px;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 34px rgba(0,0,0,.22);
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width: 0;
    }
    .logo{
      width:42px;height:42px;
      border-radius: 14px;
      background:
        radial-gradient(12px 12px at 30% 30%, rgba(255,255,255,.9), rgba(255,255,255,0) 55%),
        linear-gradient(135deg, rgba(124,92,255,1), rgba(25,194,255,1));
      box-shadow: 0 10px 30px rgba(124,92,255,.25);
      border: 1px solid rgba(255,255,255,.18);
      position:relative;
      flex:0 0 auto;
    }
    .logo:after{
      content:"";
      position:absolute; inset: 9px;
      border-radius: 12px;
      border: 1px dashed rgba(255,255,255,.38);
      opacity:.65;
    }
    .brand h1{
      font-size: 14px;
      margin:0;
      line-height:1.2;
      letter-spacing: .2px;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }
    .brand p{
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--muted2);
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }

    .actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap: wrap;
      justify-content:flex-end;
    }
    .pill{
      display:flex;
      align-items:center;
      gap:8px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      color: var(--muted);
      font-size: 12px;
      user-select:none;
    }
    .dot{
      width:8px;height:8px;border-radius:50%;
      background: var(--good);
      box-shadow: 0 0 0 4px rgba(51,214,159,.12);
    }
    .btn{
      cursor:pointer;
      border: 1px solid rgba(255,255,255,.16);
      background: linear-gradient(135deg, rgba(124,92,255,.22), rgba(25,194,255,.16));
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 12px;
      transition: transform .08s ease, border-color .2s ease, background .2s ease;
      box-shadow: 0 12px 36px rgba(0,0,0,.28);
    }
    .btn:hover{ transform: translateY(-1px); border-color: rgba(255,255,255,.25); }
    .btn:active{ transform: translateY(0px) scale(.98); }

    /* Main grid */
    .grid{
      display:grid;
      grid-template-columns: 1.3fr .7fr;
      gap:16px;
      margin-top: 16px;
    }
    @media (max-width: 920px){
      .grid{ grid-template-columns: 1fr; }
    }

    .card{
                  <div>
              <div>Top gainer</div>
              <strong id="topGainer">—</strong>
            </div>
            <div style="text-align:right">
              <div>Top loser</div>
              <strong id="topLoser">—</strong>
            </div>
          </div>

          <div class="divider" style="margin:14px 0;"></div>

          <div class="legend">
            <div>
              <div>Total saham</div>
              <strong id="countStocks">—</strong>
            </div>
            <div style="text-align:right">
              <div>Total crypto</div>
              <strong id="countCrypto">—</strong>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="foot">
      *Data harga di sini contoh (simulasi), biar tampilannya seperti dashboard rekening/portofolio.
    </div>
  </div>

      return `${withDots},${decPart}`;
